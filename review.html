<!DOCTYPE html>
<html>
<head>
  <title>Share Your Review – Charitha Kamakshi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #111;
      color: white;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    h1 {
      color: crimson;
      margin-bottom: 5px;
    }

    .note {
      font-size: 14px;
      color: #ccc;
      margin-bottom: 20px;
    }

    .container {
      max-width: 420px;
      margin: auto;
    }

    .poster {
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.6);
      margin-bottom: 15px;
    }

    textarea {
      width: 100%;
      height: 120px;
      background: #1c1c1c;
      color: white;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px;
      resize: none;
      font-size: 14px;
      margin-top: 10px;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      font-size: 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: white;
      transition: 0.3s ease;
    }

    button:hover {
      opacity: 0.85;
    }

    .primary-btn {
      background: crimson;
    }

    .instagram-btn {
      background: linear-gradient(45deg, #feda75, #fa7e1e, #d62976, #962fbf, #4f5bd5);
    }

    .whatsapp-btn {
      background-color: #25D366;
    }

    a {
      text-decoration: none;
    }

    .tag-note {
      margin-top: 10px;
      font-size: 13px;
      color: #aaa;
    }
  </style>

  <script>
    function copyText() {
      var text = document.getElementById("caption").value;
      navigator.clipboard.writeText(text);
      alert("Caption copied! Upload poster and paste caption on Instagram.");
    }
  </script>
</head>

<body>

  <h1>Share Your Experience ❤️</h1>
  <p class="note">Download poster → Copy caption → Post & Tag Official Page</p>

  <div class="container">

    <!-- Poster -->
    <img src="insta-poster.jpg" class="poster" alt="Charitha Kamakshi Poster">

    <!-- Download Poster -->
   <a href="insta-poster.jpg" download="CharithaKamakshiPoster.jpg">
  <button class="primary-btn">Download Poster</button>
</a>


    <!-- Caption -->
    <textarea id="caption" readonly>
Just watched #CharithaKamakshi ❤️  
A beautiful emotional journey with heartfelt performances.  
Special Couple Premiere Show.  
Streaming soon on ETV Win.  

#CharithaKamakshi #ETVWin
    </textarea>

    <!-- Copy Button -->
    <button onclick="copyText()" class="primary-btn">Copy Caption</button>

    <div class="tag-note">
      Tag: @charithaKamakshi <br>
      Use hashtag: #CharithaKamakshi
    </div>

    <!-- Instagram -->
    <a href="https://instagram.com" target="_blank">
      <button class="instagram-btn">Open Instagram</button>
    </a>

    <!-- WhatsApp -->
    <a href="https://wa.me/?text=Just watched Charitha Kamakshi! Beautiful emotional journey. Streaming soon on ETV Win." target="_blank">
      <button class="whatsapp-btn">Share on WhatsApp</button>
    </a>

  </div>

  <br><br>
  <a href="index.html" style="color:crimson;">Back to Home</a>

</body>
</html>
