<!DOCTYPE html>
<html>
<head>
  <title>Share Your Review – Charitha Kamakshi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #111;
      color: white;
      text-align: center;
      padding: 20px;
    }
    h1 {
      color: crimson;
    }
    .box {
      background: #1c1c1c;
      padding: 20px;
      margin: 20px auto;
      border-radius: 12px;
      max-width: 500px;
    }
    textarea {
      width: 100%;
      height: 90px;
      background: #222;
      color: white;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px;
      resize: none;
    }
    button {
      padding: 10px 20px;
      margin-top: 10px;
      font-size: 15px;
      background: crimson;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
    }
    a {
      text-decoration: none;
    }
  </style>

  <script>
    function copyText(id) {
      var copyText = document.getElementById(id);
      copyText.select();
      copyText.setSelectionRange(0, 99999);
      document.execCommand("copy");
      alert("Caption copied! Now open Instagram and paste.");
    }
  </script>

</head>
<body>

  <h1>Share Your Experience ❤️</h1>
  <p>Choose a caption, copy it, and post on Instagram. Tag our official page.</p>

  <div class="box">
    <h3>Emotional Style</h3>
    <textarea id="caption1" readonly>
Just watched #CharithaKamakshi ❤️
A beautiful emotional journey with heartfelt performances.
Streaming soon on ETV Win.
    </textarea>
    <button onclick="copyText('caption1')">Copy This Caption</button>
  </div>

  <div class="box">
    <h3>Romantic Style</h3>
    <textarea id="caption2" readonly>
Watched #CharithaKamakshi together ❤️
A touching love story filled with emotions.
Don’t miss it on ETV Win.
    </textarea>
    <button onclick="copyText('caption2')">Copy This Caption</button>
  </div>

  <div class="box">
    <h3>Energetic Style</h3>
    <textarea id="caption3" readonly>
Powerful performances 🔥
Strong emotions ❤️
#CharithaKamakshi streaming soon on ETV Win.
    </textarea>
    <button onclick="copyText('caption3')">Copy This Caption</button>
  </div>

  <div class="box">
    <a href="https://instagram.com" target="_blank">
      <button>Open Instagram</button>
    </a>

    <a href="https://wa.me/?text=Just watched Charitha Kamakshi! Beautiful emotional film. Streaming soon on ETV Win." target="_blank">
      <button>Share on WhatsApp</button>
    </a>
  </div>

  <br>
  <a href="index.html" style="color:crimson;">Back to Home</a>

</body>
</html>
