<!DOCTYPE html>
<html>
<head>
  <title>Share Your Review – Charitha Kamakshi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #111;
      color: white;
      text-align: center;
      padding: 20px;
    }
    h1 { color: crimson; }
    .box {
      background: #1c1c1c;
      padding: 20px;
      margin: 20px auto;
      border-radius: 12px;
      max-width: 500px;
    }
    img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 15px;
    }
    textarea {
      width: 100%;
      height: 100px;
      background: #222;
      color: white;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px;
      resize: none;
    }
    button {
      padding: 12px;
      margin-top: 10px;
      font-size: 15px;
      background: crimson;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
    }
  </style>

  <script>
    function copyText() {
      var copyText = document.getElementById("caption");
      copyText.select();
      copyText.setSelectionRange(0, 99999);
      document.execCommand("copy");
      alert("Caption copied! Now upload the poster and paste caption on Instagram.");
    }
  </script>

</head>
<body>

  <h1>Share Your Experience ❤️</h1>

  <div class="box">
    <img src="insta-poster.jpg" alt="Movie Poster">

    <a href="insta-poster.jpg" download>
      <button>Download Poster</button>
    </a>

    <textarea id="caption" readonly>
Just watched #CharithaKamakshi ❤️
A beautiful emotional journey with heartfelt performances.
Streaming soon on ETV Win.
    </textarea>

    <button onclick="copyText()">Copy Caption</button>

    <a href="https://instagram.com" target="_blank">
      <button>Open Instagram</button>
    </a>
  </div>

  <br>
  <a href="index.html" style="color:crimson;">Back to Home</a>

</body>
</html>
