<!DOCTYPE html>
<html>
<head>
  <title>Share Your Review</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; text-align: center; padding: 20px; }
    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 16px;
      background: crimson;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
  <script>
    function copyText() {
      const text = "Just watched #CharithaKamakshi ❤️ Beautiful emotional journey. Streaming soon on ETV Win. Don't miss it!";
      navigator.clipboard.writeText(text);
      alert("Caption copied! Now open Instagram and paste.");
    }
  </script>
</head>
<body>

<h2>Thank You for Watching ❤️</h2>

<p>Support us by sharing your review.</p>

<button onclick="copyText()">Copy Caption</button>

<br>

<a href="https://instagram.com">
  <button>Open Instagram</button>
</a>

<br>

<a href="https://wa.me/?text=Just watched Charitha Kamakshi! Streaming soon on ETV Win.">
  <button>Share on WhatsApp</button>
</a>

<br><br>

<a href="index.html">Back to Home</a>

</body>
</html>
